name: Permissions Gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  pull-request-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Evaluate pull request author
        uses: ./
        with:
          gate: pull-request
          config: permissions.toml
          on-deny: fail

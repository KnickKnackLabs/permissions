name: Permissions Issue Gate

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write

jobs:
  issue-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch policy
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Evaluate issue author
        uses: KnickKnackLabs/permissions@v0.3.0
        with:
          gate: issue
          on-deny: close

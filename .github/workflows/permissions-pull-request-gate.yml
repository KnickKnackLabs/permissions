name: Permissions Pull Request Gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pull-request-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Evaluate pull request author
        uses: KnickKnackLabs/permissions@v0.4.0
        with:
          gate: pull-request
          on-deny: close
